# ──────────────────────────────────────────────
# Application
# ──────────────────────────────────────────────
spring.application.name=portfolio-backend
server.port=${PORT:8080}

# ──────────────────────────────────────────────
# Database (Supabase PostgreSQL)
# Set these via environment variables in prod
# ──────────────────────────────────────────────
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://db.deyiwhnkkbjzwtmszfvl.supabase.co:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ──────────────────────────────────────────────
# CORS allowed origins (comma-separated)
# ──────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,https://hasebul.dev}

# ──────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
